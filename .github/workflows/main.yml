on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-24.04

    name: Types and Linting
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up UV
        uses: astral-sh/setup-uv@9ad030384d649dcdad575ef964e02a9fdce218ab  # v5.4.1
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Set up Node for Pyright
        uses: volta-cli/action@efcca962fa9a572f967a62c1d4adfd7415fda97b # v4.2.1
        with:
          node-version: "22.15.0"  # lts as of 28/04/25

      - name: Check Types and Linting
        run: >
          uv run --frozen check.py
